<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desuscripción – ONPE | Segunda Elección Presidencial 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f9;
      color: #1a2a4a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #ffffff;
      border-bottom: 3px solid #c0392b;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    header img {
      max-height: 68px;
      width: auto;
    }

    main {
      flex: 1;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 20px;
    }

    .card {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.09);
      padding: 40px 40px 36px;
      max-width: 540px;
      width: 100%;
    }

    .card h1 {
      font-size: 1.35rem;
      color: #1a2a4a;
      margin-bottom: 6px;
    }

    .card .subtitle {
      font-size: 0.92rem;
      color: #4a5568;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* ── Campo email ── */
    .campo-email {
      margin-bottom: 24px;
    }

    .campo-email label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 6px;
    }

    .campo-email input {
      width: 100%;
      padding: 11px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 0.97rem;
      font-family: inherit;
      color: #2d3748;
      transition: border-color 0.15s;
    }

    .campo-email input:focus {
      outline: none;
      border-color: #c0392b;
    }

    /* ── Opciones ── */
    .opciones { display: flex; flex-direction: column; gap: 10px; margin-bottom: 28px; }

    .opcion {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .opcion:hover { border-color: #c0392b; background: #fff5f5; }

    .opcion input[type="radio"] {
      accent-color: #c0392b;
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .opcion:has(input:checked) { border-color: #c0392b; background: #fff5f5; }
    .opcion:has(input:checked) span { font-weight: 600; color: #1a2a4a; }

    .opcion span { font-size: 0.97rem; color: #2d3748; line-height: 1.4; }

    #otro-texto {
      display: none;
      margin-top: 6px;
      margin-left: 30px;
    }

    #otro-texto textarea {
      width: 100%;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 0.9rem;
      font-family: inherit;
      color: #2d3748;
      resize: vertical;
      min-height: 72px;
    }

    #otro-texto textarea:focus { outline: none; border-color: #c0392b; }

    /* ── Botón ── */
    .btn {
      width: 100%;
      padding: 14px;
      background: #c0392b;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn:hover:not(:disabled) { background: #a93226; }
    .btn:disabled { background: #cbd5e0; cursor: not-allowed; }

    /* ── Confirmación ── */
    #confirmacion {
      display: none;
      text-align: center;
      padding: 20px 0 8px;
    }

    #confirmacion .check { font-size: 3rem; margin-bottom: 12px; }
    #confirmacion h2 { font-size: 1.2rem; color: #1a2a4a; margin-bottom: 8px; }
    #confirmacion p { font-size: 0.9rem; color: #4a5568; line-height: 1.5; }

    /* ── Footer ── */
    footer {
      background: #1a2a4a;
      color: #a0aec0;
      text-align: center;
      font-size: 0.78rem;
      padding: 14px 20px;
    }

    footer a { color: #90cdf4; text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .card { padding: 28px 18px 24px; }
      .card h1 { font-size: 1.15rem; }
    }
  </style>
</head>
<body>

  <header>
    <img src="LogoONPE.png" alt="ONPE – Segunda Elección Presidencial 7 de junio de 2026" />
  </header>

  <main>
    <div class="card">

      <div id="formulario">
        <h1>¿Por qué deseas desuscribirte?</h1>
        <p class="subtitle">Selecciona el motivo para dejar de recibir comunicaciones de ONPE.</p>

        <form id="form-desuscripcion">

          <!-- Campo correo -->
          <div class="campo-email">
            <label for="input-email">Tu correo electrónico</label>
            <input
              type="email"
              id="input-email"
              placeholder="ejemplo@correo.com"
              required
              autocomplete="email"
            />
          </div>

          <!-- Motivos -->
          <div class="opciones">

            <label class="opcion">
              <input type="radio" name="motivo" value="Ya no deseo recibir estos correos" />
              <span>Ya no deseo recibir estos correos</span>
            </label>

            <label class="opcion">
              <input type="radio" name="motivo" value="El contenido no es relevante para mí" />
              <span>El contenido no es relevante para mí</span>
            </label>

            <label class="opcion">
              <input type="radio" name="motivo" value="Recibo demasiados correos" />
              <span>Recibo demasiados correos</span>
            </label>

            <label class="opcion">
              <input type="radio" name="motivo" value="Nunca me suscribí a estas comunicaciones" />
              <span>Nunca me suscribí a estas comunicaciones</span>
            </label>
            
            <label class="opcion">
              <input type="radio" name="motivo" value="No confío en ONPE" />
              <span>No confío en ONPE</span>
            </label>

            <label class="opcion">
              <input type="radio" name="motivo" value="otro" id="radio-otro" />
              <span>Otro motivo</span>
            </label>

            <div id="otro-texto">
              <textarea id="texto-otro" placeholder="Describe tu motivo…" maxlength="300"></textarea>
            </div>

          </div>

          <button type="submit" class="btn" id="btn-enviar" disabled>Confirmar desuscripción</button>
        </form>
      </div>

      <div id="confirmacion">
        
        <h2>Solicitud registrada</h2>
        <p>Tu solicitud de desuscripción ha sido recibida correctamente.</p>
      </div>

    </div>
  </main>

  <footer>
    <p>© 2026 Oficina Nacional de Procesos Electorales – ONPE &nbsp;|&nbsp;
       <a href="https://www.onpe.gob.pe" target="_blank" rel="noopener noreferrer">www.onpe.gob.pe</a>
    </p>
  </footer>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxhewrvuSkz5BXRaoW89GsFHzS2EtOm28Qu2RLZkFLDIZ-ZcmssDuYUi7w4KAIFGsdO/exec";


    const form      = document.getElementById("form-desuscripcion");
    const btnEnviar = document.getElementById("btn-enviar");
    const radioOtro = document.getElementById("radio-otro");
    const otroTexto = document.getElementById("otro-texto");
    const inputEmail = document.getElementById("input-email");

    // Habilitar botón cuando hay correo + motivo seleccionado
    function verificarFormulario() {
      const tieneEmail  = inputEmail.value.trim() !== "" && inputEmail.validity.valid;
      const tieneMotivo = !!form.querySelector('input[name="motivo"]:checked');
      btnEnviar.disabled = !(tieneEmail && tieneMotivo);
    }

    inputEmail.addEventListener("input", verificarFormulario);

    form.querySelectorAll('input[name="motivo"]').forEach(radio => {
      radio.addEventListener("change", () => {
        verificarFormulario();
        otroTexto.style.display = radioOtro.checked ? "block" : "none";
        if (!radioOtro.checked) document.getElementById("texto-otro").value = "";
      });
    });

    // Envío
    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = inputEmail.value.trim();
      const seleccionado = form.querySelector('input[name="motivo"]:checked');
      if (!seleccionado || !email) return;

      let motivo = seleccionado.value;
      if (motivo === "otro") {
        const textoLibre = document.getElementById("texto-otro").value.trim();
        motivo = textoLibre ? "Otro: " + textoLibre : "Otro";
      }

      btnEnviar.disabled = true;
      btnEnviar.textContent = "Enviando…";

      // Mostrar confirmación de inmediato
      document.getElementById("formulario").style.display = "none";
      document.getElementById("confirmacion").style.display = "block";

      // Enviar en segundo plano sin bloquear
      const url = SCRIPT_URL
        + "?email="  + encodeURIComponent(email)
        + "&motivo=" + encodeURIComponent(motivo);
      fetch(url, { method: "GET", mode: "no-cors" }).catch(() => {});
    });
  </script>

</body>
</html>
